<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Requests — Vehicle Rental System</title>
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<script src="assets/app.js"></script>
<script>
  const user = Auth.require('user');
</script>

<div class="app">
  <div id="sidebar-mount"></div>
  <div id="mobile-header-mount"></div>

  <main class="main">
    <script>document.write(renderDemoBanner());</script>

    <div class="page-header">
      <div>
        <div class="breadcrumbs">
          <a href="catalog.html">Home</a> <span>/</span>
          <span style="color:var(--text);">My Requests</span>
        </div>
        <h1 class="page-title">My Rental Requests</h1>
        <p class="page-subtitle">Track the status of your vehicle rental requests.</p>
      </div>
      <div>
        <a href="request.html" class="btn btn-primary">+ New Request</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Requests table -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Request History</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-sm filter-btn active" data-status="all">All</button>
          <button class="btn btn-sm filter-btn" data-status="pending">Pending</button>
          <button class="btn btn-sm filter-btn" data-status="approved">Approved</button>
          <button class="btn btn-sm filter-btn" data-status="rejected">Rejected</button>
        </div>
      </div>
      <div class="card-body no-padding">
        <div id="requestList"></div>
      </div>
    </div>

  </main>
</div>

<script>
  document.getElementById('sidebar-mount').outerHTML = renderSidebar('my-requests');
  document.getElementById('mobile-header-mount').outerHTML = renderMobileHeader('My Requests');

  const data = DB.load();
  let currentFilter = 'all';

  function render() {
    const myRequests = data.requests
      .filter(r => r.userId === user.id)
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    // Stats
    const stats = {
      total: myRequests.length,
      pending: myRequests.filter(r => r.status === 'pending').length,
      approved: myRequests.filter(r => r.status === 'approved').length,
      rejected: myRequests.filter(r => r.status === 'rejected').length
    };

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Total Requests</div>
        <div class="stat-value">${stats.total}</div>
        <div class="stat-meta">All time</div>
      </div>
      <div class="stat-card warning">
        <div class="stat-label">Pending Review</div>
        <div class="stat-value">${stats.pending}</div>
        <div class="stat-meta">Awaiting admin response</div>
      </div>
      <div class="stat-card success">
        <div class="stat-label">Approved</div>
        <div class="stat-value">${stats.approved}</div>
        <div class="stat-meta">Ready for use</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rejected</div>
        <div class="stat-value" style="color:var(--danger-text);">${stats.rejected}</div>
        <div class="stat-meta">See review notes</div>
      </div>
    `;

    // Filter
    const filtered = currentFilter === 'all' ? myRequests : myRequests.filter(r => r.status === currentFilter);

    const list = document.getElementById('requestList');
    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          <div class="empty-title">No ${currentFilter === 'all' ? '' : currentFilter} requests</div>
          <div class="empty-text">${currentFilter === 'all' ? 'You haven\'t submitted any requests yet.' : 'Try a different filter.'}</div>
          ${currentFilter === 'all' ? '<a href="request.html" class="btn btn-primary">Submit your first request</a>' : ''}
        </div>`;
      return;
    }

    list.innerHTML = `
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Date</th>
              <th>Vehicle</th>
              <th>Activity</th>
              <th>Participants</th>
              <th>Status</th>
              <th class="actions">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.map(r => `
              <tr>
                <td style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted);">#${r.id}</td>
                <td>${fmt.date(r.requestDate)}</td>
                <td>${fmt.vehicleType(r.vehicleType)}</td>
                <td>${escapeHtml(r.activity.length > 40 ? r.activity.slice(0, 40) + '…' : r.activity)}</td>
                <td>${r.participants}</td>
                <td><span class="badge ${
                  r.status === 'approved' ? 'success' :
                  r.status === 'rejected' ? 'danger' : 'warning'
                }">${fmt.status(r.status)}</span></td>
                <td class="actions">
                  ${r.status === 'approved' ? `<a href="approval-print.html?id=${r.id}" class="btn btn-sm" target="_blank">📄 Print</a>` : ''}
                  <button class="btn btn-sm" onclick="showDetail(${r.id})">View</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  function showDetail(id) {
    const r = data.requests.find(req => req.id === id);
    if (!r) return;
    alert(
      `Request #${r.id}\n\n` +
      `Status: ${fmt.status(r.status).toUpperCase()}\n` +
      `Date: ${fmt.date(r.requestDate)}\n` +
      `Vehicle: ${fmt.vehicleType(r.vehicleType)}\n` +
      `School Unit: ${fmt.unit(r.schoolUnit)}\n` +
      `Activity: ${r.activity}\n` +
      `Participants: ${r.participants}\n` +
      `Address: ${r.address}\n` +
      `Standby: ${r.standbyLocation} at ${r.standbyTime}\n` +
      `Time: ${r.startTime} – ${r.endTime}\n` +
      `Notes: ${r.notes || '—'}\n\n` +
      (r.status !== 'pending' ? `Admin Note: ${r.reviewNote || '—'}\nReviewed: ${fmt.dateTime(r.reviewedAt)}` : 'Awaiting admin review.')
    );
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.status;
      render();
    });
  });

  const style = document.createElement('style');
  style.textContent = `.filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }`;
  document.head.appendChild(style);

  render();
</script>

</body>
</html>
