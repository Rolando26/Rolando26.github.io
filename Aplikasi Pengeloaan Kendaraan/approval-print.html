<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Approval Letter — Vehicle Rental System</title>
<link rel="stylesheet" href="assets/style.css" />
<style>
  body { background: var(--bg-subtle); padding: 20px; }

  .print-toolbar {
    max-width: 820px;
    margin: 0 auto 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .print-page {
    max-width: 820px;
    margin: 0 auto;
    background: white;
    box-shadow: 0 0 0 1px var(--border), 0 8px 30px rgba(0,0,0,0.08);
    padding: 60px 70px;
    color: #111;
    font-family: "Times New Roman", Georgia, serif;
    font-size: 13px;
    line-height: 1.6;
    min-height: 1100px;
  }

  .letter-header {
    text-align: center;
    border-bottom: 3px double #111;
    padding-bottom: 20px;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .letter-logo {
    width: 70px; height: 70px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800;
    flex-shrink: 0;
    font-family: var(--font-sans);
  }
  .letter-org {
    text-align: left;
    flex: 1;
  }
  .letter-org .name {
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .letter-org .addr {
    font-size: 11px;
    color: #555;
    line-height: 1.4;
  }

  .letter-title {
    text-align: center;
    margin-bottom: 28px;
  }
  .letter-title .title {
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-decoration: underline;
    margin-bottom: 4px;
  }
  .letter-title .ref {
    font-size: 12px;
    color: #555;
  }

  .letter-meta {
    display: flex;
    justify-content: space-between;
    margin-bottom: 24px;
    font-size: 13px;
  }

  .letter-body p {
    margin-bottom: 14px;
    text-align: justify;
  }

  .letter-table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0 24px;
    font-size: 12px;
  }
  .letter-table td {
    padding: 6px 12px;
    border: 1px solid #ccc;
  }
  .letter-table td:first-child {
    background: #f5f5f5;
    font-weight: 600;
    width: 40%;
  }

  .letter-signatures {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    margin-top: 50px;
    text-align: center;
    font-size: 12px;
  }
  .signature-block { padding-top: 0; }
  .signature-line {
    border-bottom: 1px solid #111;
    height: 80px;
    margin-bottom: 6px;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 4px;
    font-style: italic;
    color: #888;
  }
  .signature-name {
    font-weight: 700;
    margin-bottom: 2px;
  }
  .signature-role {
    font-size: 11px;
    color: #555;
  }

  .letter-footer {
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid #ddd;
    font-size: 10px;
    color: #888;
    text-align: center;
  }
  .letter-footer code {
    font-family: var(--font-mono);
    background: #f5f5f5;
    padding: 1px 5px;
    border-radius: 3px;
  }

  .approved-stamp {
    position: absolute;
    top: 100px;
    right: 60px;
    width: 130px; height: 130px;
    border: 4px solid var(--success-text);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    font-weight: 800;
    color: var(--success-text);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transform: rotate(-12deg);
    opacity: 0.8;
    font-family: var(--font-sans);
    line-height: 1.1;
    text-align: center;
  }
  .print-page { position: relative; }

  .error-card {
    max-width: 600px;
    margin: 80px auto;
    padding: 40px;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    text-align: center;
  }
</style>
</head>
<body>

<script src="assets/app.js"></script>
<script>
  const user = Auth.require();
</script>

<div id="content"></div>

<script>
  const data = DB.load();
  const params = new URLSearchParams(window.location.search);
  const reqId = parseInt(params.get('id'));
  const r = data.requests.find(x => x.id === reqId);

  if (!r || r.status !== 'approved') {
    document.getElementById('content').innerHTML = `
      <div class="error-card">
        <div style="font-size:48px;margin-bottom:12px;">📄</div>
        <h2 style="margin-bottom:8px;">Letter Not Available</h2>
        <p style="color:var(--text-muted);margin-bottom:20px;">
          ${!r ? 'This request does not exist.' : 'This request is not yet approved. The approval letter will be available once an admin approves it.'}
        </p>
        <a href="${user.role === 'admin' ? 'admin.html' : 'my-requests.html'}" class="btn btn-primary">← Back</a>
      </div>
    `;
  } else if (user.role !== 'admin' && r.userId !== user.id) {
    document.getElementById('content').innerHTML = `
      <div class="error-card">
        <h2>Access Denied</h2>
        <p style="color:var(--text-muted);margin:12px 0 20px;">You don't have permission to view this letter.</p>
        <a href="my-requests.html" class="btn">← Back</a>
      </div>
    `;
  } else {
    renderLetter();
  }

  function renderLetter() {
    const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    const reviewedDate = r.reviewedAt ? new Date(r.reviewedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : today;
    const reqDate = new Date(r.requestDate).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const refNum = `VRS/${new Date(r.reviewedAt || Date.now()).getFullYear()}/${String(r.id).padStart(5, '0')}`;

    document.getElementById('content').innerHTML = `
      <div class="print-toolbar no-print">
        <a href="${user.role === 'admin' ? 'admin.html' : 'my-requests.html'}" class="btn">← Back</a>
        <div style="display:flex;gap:8px;">
          <button class="btn" onclick="window.print()">🖨 Print Letter</button>
          <button class="btn btn-primary" onclick="window.print()">Save as PDF</button>
        </div>
      </div>

      <div class="print-page">
        <div class="approved-stamp">Approved</div>

        <header class="letter-header">
          <div class="letter-logo">V</div>
          <div class="letter-org">
            <div class="name">Cinta Kasih Tzu Chi School</div>
            <div class="addr">
              School Vehicle Rental System · Jakarta, Indonesia<br>
              Office of Operations · operations@school.demo · +62 21 555-0100
            </div>
          </div>
        </header>

        <div class="letter-title">
          <div class="title">Vehicle Rental Approval Letter</div>
          <div class="ref">Reference No: ${refNum}</div>
        </div>

        <div class="letter-meta">
          <div><strong>Issued:</strong> ${reviewedDate}</div>
          <div><strong>Valid for:</strong> ${reqDate}</div>
        </div>

        <div class="letter-body">
          <p>To Whom It May Concern,</p>

          <p>This letter formally approves the school vehicle rental request submitted by
            <strong>${escapeHtml(r.requesterName)}</strong> on behalf of the
            <strong>${fmt.unit(r.schoolUnit)}</strong> unit, for the activity described below.</p>

          <table class="letter-table">
            <tr><td>Requester Name</td><td>${escapeHtml(r.requesterName)}</td></tr>
            <tr><td>Contact Number</td><td>${escapeHtml(r.phone)}</td></tr>
            <tr><td>School Unit</td><td>${fmt.unit(r.schoolUnit)}</td></tr>
            <tr><td>Activity / Purpose</td><td>${escapeHtml(r.activity)}</td></tr>
            <tr><td>Number of Participants</td><td>${r.participants} people</td></tr>
            <tr><td>Vehicle Approved</td><td>${fmt.vehicleType(r.vehicleType)}</td></tr>
            <tr><td>Date of Use</td><td>${reqDate}</td></tr>
            <tr><td>Standby Location</td><td>${escapeHtml(r.standbyLocation)}</td></tr>
            <tr><td>Standby Time</td><td>${r.standbyTime}</td></tr>
            <tr><td>Departure / Return</td><td>${r.startTime} &nbsp;→&nbsp; ${r.endTime}</td></tr>
            <tr><td>Destination Address</td><td>${escapeHtml(r.address)}</td></tr>
            ${r.notes ? `<tr><td>Special Notes</td><td>${escapeHtml(r.notes)}</td></tr>` : ''}
            ${r.reviewNote ? `<tr><td>Admin Note</td><td>${escapeHtml(r.reviewNote)}</td></tr>` : ''}
          </table>

          <p>The applicant is required to follow standard vehicle handling procedures, ensure
            the safety of all passengers throughout the journey, and return the vehicle to the
            designated location at the time stated above.</p>

          <p>Any deviation from the approved schedule, route, or activity must be communicated
            to the school operations office in advance.</p>

          <p>Thank you for your attention and cooperation.</p>
        </div>

        <div class="letter-signatures">
          <div class="signature-block">
            <div class="signature-line">— signed —</div>
            <div class="signature-name">${escapeHtml(r.requesterName)}</div>
            <div class="signature-role">Requester</div>
          </div>
          <div class="signature-block">
            <div class="signature-line">— signed —</div>
            <div class="signature-name">School Operations Admin</div>
            <div class="signature-role">Authorized Approver</div>
          </div>
        </div>

        <div class="letter-footer">
          Document generated electronically by VRS · Reference: <code>${refNum}</code> ·
          This is a demonstration document. In production, this would be a legally signed school document.
        </div>
      </div>
    `;
  }
</script>

</body>
</html>
